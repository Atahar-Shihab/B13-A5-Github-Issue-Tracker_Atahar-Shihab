<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Issues Tracker</title>
     <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-[#F3F4F6] text-gray-800 min-h-screen">

    <nav class="bg-white shadow-sm p-4 flex flex-col md:flex-row justify-between items-center gap-4">
        <div class="font-bold text-xl flex items-center gap-2">
            <img src="assets/github-logo.png" alt="Logo" class="w-8 h-8">
            GitHub Issues Tracker
        </div>
        <div class="flex gap-4 w-full md:w-auto">
            <div class="relative w-full md:w-72">
                <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-gray-400">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
                </span>
                <input type="text" id="searchInput" placeholder="Search issues..." class="border border-gray-300 p-2 pl-9 rounded-md w-full focus:outline-none focus:ring-2 focus:ring-[#4F46E5]">
            </div>
            <button class="bg-[#4F46E5] text-white px-4 py-2 rounded-md font-medium whitespace-nowrap hover:bg-blue-700 transition">+ New Issue</button>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto p-4 md:p-8">
        
        <div class="bg-white rounded-lg shadow-sm p-6 border border-gray-200">
            
            <div class="flex gap-2 mb-8 bg-white p-1 rounded-md w-fit border border-gray-200">
                <button class="tab-btn active px-8 py-1.5 rounded bg-[#4F46E5] text-white text-sm font-medium transition" data-filter="All">All</button>
                <button class="tab-btn px-8 py-1.5 rounded text-gray-600 hover:bg-gray-100 text-sm font-medium transition" data-filter="Open">Open</button>
                <button class="tab-btn px-8 py-1.5 rounded text-gray-600 hover:bg-gray-100 text-sm font-medium transition" data-filter="Closed">Closed</button>
            </div>

            <div class="flex justify-between items-center mb-6 pb-4 border-b border-dashed border-gray-200">
                <div class="flex items-center gap-3">
                    <div class="bg-purple-100 p-2 rounded-full flex items-center justify-center">
                        <img src="assets/Aperture.png" alt="Tracker Icon" class="w-7 h-7">
                    </div>
                    <div>
                        <h2 class="text-lg font-bold flex items-center gap-2">
                            <span id="issueCount">0</span> Issues
                        </h2>
                        <p class="text-xs text-gray-500">Track and manage your project issues</p>
                    </div>
                </div>
                <div class="flex gap-4 text-xs font-medium text-gray-600">
                    <span class="flex items-center gap-1"><span class="w-2.5 h-2.5 rounded-full bg-green-500"></span> Open</span>
                    <span class="flex items-center gap-1"><span class="w-2.5 h-2.5 rounded-full bg-purple-500"></span> Closed</span>
                </div>
            </div>

            <div id="loader" class="text-center py-16">
                <div class="inline-block animate-spin rounded-full h-10 w-10 border-4 border-gray-200 border-t-[#4F46E5] mb-4"></div>
                <p class="text-gray-500 font-medium">Loading issues data...</p>
            </div>

            <div id="issuesGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4 hidden">
                </div>
            
        </div>
    </main>
        <div id="issueModal" class="fixed inset-0 bg-black bg-opacity-5 hidden flex items-center justify-center p-4 z-50">
        <div class="bg-white rounded-xl p-8 max-w-2xl w-full shadow-2xl relative">
            <div id="modalContent">
                </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
