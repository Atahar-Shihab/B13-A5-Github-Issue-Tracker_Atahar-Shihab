<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In - GitHub Issues Tracker</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-gray-100 h-screen flex items-center justify-center">

    <div class="bg-white p-8 rounded-lg shadow-md w-96">
        <div class="text-center mb-6">
            <img src="assets/github-logo.png" alt="GitHub Logo" class="w-16 h-16 mx-auto mb-4">
            <h1 class="text-xl font-bold">GitHub Issues Tracker</h1>
            <p class="text-sm text-gray-500">Sign in to manage your issues</p>
        </div>

        <div class="space-y-4">
            <div>
                <label class="block text-sm font-medium mb-1">Username</label>
                <input type="text" id="username" class="w-full border p-2 rounded focus:outline-none focus:ring-2 focus:ring-blue-600" placeholder="Enter Username">
                <p class="text-[10px] text-blue-600 mt-1">Default: admin</p>
            </div>
            <div>
                <label class="block text-sm font-medium mb-1">Password</label>
                <input type="password" id="password" class="w-full border p-2 rounded focus:outline-none focus:ring-2 focus:ring-blue-600" placeholder="Enter Password">
                <p class="text-[10px] text-blue-600 mt-1">Default: admin123</p>
            </div>
            
            <button id="loginBtn" class="w-full bg-blue-600 text-white p-2 mt-2 rounded font-medium hover:bg-blue-700 transition">Sign In</button>
            
            <div class="flex items-center my-4">
                <div class="flex-grow border-t border-gray-300"></div>
                <span class="px-3 text-gray-500 text-sm">OR</span>
                <div class="flex-grow border-t border-gray-300"></div>
            </div>

            <div class="text-center text-sm bg-gray-50 p-4 rounded border border-gray-100">
                <p class="text-gray-500 mb-2">Demo Credentials:</p>
                <p><strong>Username:</strong> admin</p>
                <p><strong>Password:</strong> admin123</p>
            </div>
            
            <p id="errorMsg" class="text-red-500 text-sm text-center hidden font-medium">Invalid credentials! Please try again.</p>
        </div>
    </div>

    <script>
        
        document.getElementById('loginBtn').addEventListener('click', function() {
            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;
            const error = document.getElementById('errorMsg');

            
            if(user === 'admin' && pass === 'admin123') {
                window.location.href = 'dashboard.html'; 
            } else {
                error.classList.remove('hidden');
            }
        });
    </script>
</body>
</html>
